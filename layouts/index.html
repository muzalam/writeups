{{ define "main" }}
<section class="list-section">
  <h1 class="section-title">Writeups</h1>
  <div class="post-list">
    {{ range where .Site.RegularPages "Section" "posts" }}
    <article class="post-card">
      <div class="post-meta">
        <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "02 Jan 2006" }}</time>
        {{ range .Params.tags }}
        <span class="tag">{{ . }}</span>
        {{ end }}
      </div>
      <h3 class="post-title"><a href="{{ .Permalink }}">{{ .Title }}</a></h3>
      <p class="post-summary">{{ .Summary }}</p>
      <a href="{{ .Permalink }}" class="read-more">Read writeup &rarr;</a>
    </article>
    {{ end }}
  </div>
</section>
{{ end }}
